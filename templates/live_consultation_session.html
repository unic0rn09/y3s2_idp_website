{% block scripts %}
<script>
    // 1. TURN ON GLOBAL PROTECTION
    window.isUnsaved = true;

    // 2. Turn OFF protection when purposely finishing the form
    document.getElementById('finishLiveForm').addEventListener('submit', function() {
        window.isUnsaved = false;
    });

    let isPaused = false; let isEditing = false;
    let mediaRecorder; let audioContext; let analyser; let dataArray; let animationId; let audioChunks = [];

    function confirmExit() { openModal('exitModal'); }
    function confirmFinish() { 
        if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        openModal('finishModal'); 
    }
    
    function openModal(id) {
        document.getElementById(id).classList.remove('hidden');
        setTimeout(() => { document.getElementById(id + 'Content').classList.remove('scale-95', 'opacity-0'); document.getElementById(id + 'Content').classList.add('scale-100', 'opacity-100'); }, 10);
    }
    function closeModal(id) {
        document.getElementById(id + 'Content').classList.remove('scale-100', 'opacity-100'); document.getElementById(id + 'Content').classList.add('scale-95', 'opacity-0');
        setTimeout(() => { document.getElementById(id).classList.add('hidden'); }, 300);
    }

    async function startSession() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            mediaRecorder.ondataavailable = e => { audioChunks.push(e.data); };
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            document.getElementById('initialState').classList.add('hidden');
            document.getElementById('activeState').classList.remove('hidden');
            document.getElementById('activeState').classList.add('flex');
            document.getElementById('recordingIndicator').classList.remove('hidden');
            document.getElementById('editToggleBtn').classList.remove('hidden');

            setRecordingUIStatus(true);
            drawRealWaves(); 

            // Mock transcription injection
            setTimeout(() => { if(!isPaused) { document.getElementById('transcriptionBox').value += "Patient reports experiencing high fever for the past three days...\n\n"; } }, 3000);

        } catch (err) { alert("Microphone access is required."); }
    }

    function drawRealWaves() {
        if(isPaused) return; 
        animationId = requestAnimationFrame(drawRealWaves);
        analyser.getByteFrequencyData(dataArray);

        const container = document.getElementById('waveContainer');
        if (container.children.length === 0) {
             for(let i=0; i<25; i++) {
                 let bar = document.createElement('div');
                 bar.className = 'w-2 rounded-full transition-all duration-75 ease-out';
                 container.appendChild(bar);
             }
        }
        
        const bars = container.children;
        for(let i=0; i<25; i++) {
            let height = Math.max(4, ((dataArray[i] || 0) / 255) * 60);
            bars[i].style.height = height + 'px';
            if(height > 40) bars[i].className = 'w-2 bg-blue-400 rounded-full transition-all duration-75';
            else bars[i].className = 'w-2 bg-blue-600 rounded-full transition-all duration-75';
        }
    }

    function togglePause() {
        const btn = document.getElementById('btnPause'); const icon = document.getElementById('pauseIcon'); const text = document.getElementById('pauseText');
        isPaused = !isPaused;

        if (isPaused) {
            if(mediaRecorder.state === "recording") mediaRecorder.pause();
            btn.classList.replace('bg-orange-500', 'bg-green-600'); btn.classList.replace('hover:bg-orange-600', 'hover:bg-green-700');
            icon.classList.replace('fa-pause', 'fa-play'); text.innerText = "Resume";
            setRecordingUIStatus(false); cancelAnimationFrame(animationId);
            const bars = document.getElementById('waveContainer').querySelectorAll('div'); bars.forEach(bar => { bar.style.height = '4px'; });
        } else {
            if(mediaRecorder.state === "paused") mediaRecorder.resume();
            btn.classList.replace('bg-green-600', 'bg-orange-500'); btn.classList.replace('hover:bg-green-700', 'hover:bg-orange-600');
            icon.classList.replace('fa-play', 'fa-pause'); text.innerText = "Pause";
            setRecordingUIStatus(true); drawRealWaves(); 
        }
    }

    function setRecordingUIStatus(isRecording) {
        const iDot = document.getElementById('redDot'); const iText = document.getElementById('recordingStatusText'); const iBox = document.getElementById('recordingIndicator');
        if (isRecording) {
            iDot.classList.add('animate-pulse', 'bg-red-500'); iDot.classList.remove('bg-gray-400');
            iText.innerText = "Recording"; iText.classList.replace('text-gray-600', 'text-red-600');
            iBox.classList.replace('bg-gray-100', 'bg-red-50'); iBox.classList.replace('border-gray-200', 'border-red-100');
        } else {
            iDot.classList.remove('animate-pulse', 'bg-red-500'); iDot.classList.add('bg-gray-400');
            iText.innerText = "Paused"; iText.classList.replace('text-red-600', 'text-gray-600');
            iBox.classList.replace('bg-red-50', 'bg-gray-100'); iBox.classList.replace('border-red-100', 'border-gray-200');
        }
    }

    function toggleEdit() {
        const tBox = document.getElementById('transcriptionBox'); const btn = document.getElementById('editToggleBtn');
        isEditing = !isEditing;
        if (isEditing) {
            tBox.removeAttribute('readonly'); tBox.classList.replace('bg-gray-50', 'bg-white'); tBox.classList.add('ring-2', 'ring-inset', 'ring-blue-500'); tBox.focus();
            btn.innerHTML = '<i class="fas fa-save mr-1.5 text-xs"></i> Save'; btn.classList.replace('text-blue-600', 'text-green-600'); btn.classList.replace('hover:text-blue-800', 'hover:text-green-800');
        } else {
            tBox.setAttribute('readonly', 'true'); tBox.classList.replace('bg-white', 'bg-gray-50'); tBox.classList.remove('ring-2', 'ring-inset', 'ring-blue-500');
            btn.innerHTML = '<i class="fas fa-pen mr-1.5 text-xs"></i> Edit'; btn.classList.replace('text-green-600', 'text-blue-600'); btn.classList.replace('hover:text-green-800', 'hover:text-blue-800');
        }
    }
</script>
{% endblock %}
