// Inside your <script> tag in live_consultation_session.html

let mediaRecorder;
let chunkCounter = 0;
let pendingUploads = 0;
let isFinishing = false;

async function startSession() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        
        // 🚀 START WITHOUT SLICE: We use a manual interval for better reliability
        mediaRecorder.start(); 

        // 🚀 4000ms FIX: Forces a fresh, valid file with headers every 4 seconds
        const recorderInterval = setInterval(() => {
            if (mediaRecorder.state === "recording" && !isFinishing) {
                mediaRecorder.stop(); 
                mediaRecorder.start();
            } else if (isFinishing) {
                clearInterval(recorderInterval);
            }
        }, 4000);

        mediaRecorder.ondataavailable = async e => {
            // 🚀 2000 BYTES FIX: Ensures we don't send tiny noise fragments
            if (e.data.size > 2000) {
                pendingUploads++;
                const formData = new FormData();
                formData.append('audio', new Blob([e.data], { type: 'audio/webm' }));
                formData.append('patient_id', "{{ patient.id }}");
                formData.append('chunk_index', chunkCounter++);

                try {
                    const response = await fetch('/api/transcribe', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.text) {
                        const tBox = document.getElementById('transcriptionBox');
                        tBox.value += (tBox.value ? " " : "") + result.text;
                        tBox.scrollTop = tBox.scrollHeight;
                    }
                } finally {
                    pendingUploads--;
                    // If finishing and last chunk is done, submit the form
                    if (isFinishing && pendingUploads <= 0) {
                        submitFinalForm();
                    }
                }
            }
        };
    } catch (err) { console.error("Mic error:", err); }
}

document.getElementById('finishLiveForm').addEventListener('submit', function(e) {
    e.preventDefault();
    isFinishing = true;
    
    // UI Feedback
    const btn = document.getElementById('finishBtn');
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Finalizing...';
    btn.disabled = true;

    // Move screen text to hidden input
    document.getElementById('hiddenTranscription').value = document.getElementById('transcriptionBox').value;

    // 🚀 3000ms SAFETY FIX: Force submit even if a chunk is stuck
    setTimeout(() => {
        submitFinalForm();
    }, 3000);

    if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
});

function submitFinalForm() {
    HTMLFormElement.prototype.submit.call(document.getElementById('finishLiveForm'));
}
