{% block scripts %}
<script>
    // 1. TURN ON GLOBAL PROTECTION (because doctor is editing draft)
    window.isUnsaved = true;

    const form = document.getElementById('summaryForm');

    function confirmSummaryExit() { document.getElementById('summaryExitModal').classList.remove('hidden'); }
    function confirmGenerate() { document.getElementById('genModal').classList.remove('hidden'); }
    
    // Switch action dynamically based on what the user wants to do
    function saveAsDraft() {
        window.isUnsaved = false; // Turn OFF protection
        form.action = "/doctor/save_draft/{{ patient.id }}";
        form.submit();
    }

    function submitFinalReport() {
        window.isUnsaved = false; // Turn OFF protection
        form.action = "/doctor/generate_report/{{ patient.id }}";
        form.submit();
    }

    let isTranslated = false;
    let originalText = document.getElementById('rawText').value;
    
    function toggleTranslation() {
        const tb = document.getElementById('rawText');
        const btn = document.getElementById('transBtn');
        isTranslated = !isTranslated;
        if(isTranslated) {
            tb.value = "Patient presents with acute fever and headache lasting for 2 days. Did not take any medication. Does not smoke but drinks occasionally...";
            btn.innerHTML = '<i class="fas fa-undo mr-2"></i>View Original Raw Text';
            btn.className = "bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg text-sm transition";
        } else {
            tb.value = originalText;
            btn.innerHTML = '<i class="fas fa-language mr-2"></i>Translate to English';
            btn.className = "bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2 px-4 rounded-lg text-sm transition";
        }
    }
</script>
{% endblock %}
